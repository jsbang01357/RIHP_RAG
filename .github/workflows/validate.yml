name: Validate static site

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build search index
        run: python3 scripts/build_site.py

      - name: Build ChatGPT RAG pack
        run: python3 scripts/build_exports.py

      - name: Validate download pack
        run: python3 scripts/test_exports.py

      - name: Validate static site
        run: python3 scripts/test_site.py

      - name: Validate search behavior
        run: node scripts/test_search_logic.mjs
